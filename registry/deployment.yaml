apiVersion: v1
kind: Secret
metadata:
  name: registry-tls
type: Opaque
data:
  tls.cert: 
  tls.key: 

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docker-registry
  labels:
    app: docker-registry
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---

apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  name: docker-registry
  labels:
    app: docker-registry
spec:
  replicas: 1
  template:
    metadata:
      name: docker-registry
      labels:
        app: docker-registry
    spec:
      containers:
      - name: registry
        image: registry:2
        env:
        - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
          value: /data
        - name: REGISTRY_HTTP_TLS_CERTIFICATE
          value: /tls/tls.cert
        - name: REGISTRY_HTTP_TLS_KEY
          value: /tls/tls.key
        volumeMounts:
        - mountPath: /data
          name: registry-data
        - mountPath: /tls
          name: registry-tls
        ports:
        - containerPort: 5000
          protocol: TCP
          name: registry

      volumes:
      - name: registry-tls
        secret:
          secretName: registry-tls
      - name: registry-data
        persistentVolumeClaim:
          claimName: docker-registry

